edition: 3.0.0
name: zou-backend
access: "default-volcano"

vars:
  sid: "zou"
  region: "cn-beijing"
  functionName: "zou-backend-function"

resources:
  zou_backend:
    component: volcano-vefaas
    props:
      common:
        Region: ${vars.region}
      function:
        Name: ${vars.functionName}
        Description: "Zou (Kitsu) backend API"
        ExclusiveMode: true
        RequestTimeout: 600
        Runtime: native/v1
        SourceType: image
        Source: dcc-cloud2-cn-beijing.cr.volces.com/dcc-cloud/zou-backend:0.0.2
        MemoryMB: 8192
        Processor: cpu
        Port: 8000
        Envs:
          - Key: PORT
            Value: "8000"
          - Key: DB_HOST
            Value: "cp-right-snap-882d737b.pg7.aidap-global.cn-beijing.volces.com"
          - Key: DB_PORT
            Value: "5432"
          - Key: DB_DATABASE
            Value: "aidb"
          - Key: DB_USERNAME
            Value: "user_admin"
          - Key: DB_PASSWORD
            Value: ${env(DB_PASSWORD)}
          - Key: KV_HOST
            Value: "redis-cnlfksdzmxmoe449a.redis.volces.com"
          - Key: KV_PORT
            Value: "6379"
          - Key: KV_USERNAME
            Value: "kevin"
          - Key: KV_PASSWORD
            Value: ${env(KV_PASSWORD)}
          - Key: KV_AUTH_TOKEN_BLACKLIST_KV_INDEX
            Value: "10"
          - Key: KV_MEMOIZE_DB_INDEX
            Value: "11"
          - Key: KV_EVENTS_DB_INDEX
            Value: "12"
          - Key: KV_JOB_DB_INDEX
            Value: "13"
          - Key: KV_CONFIG_DB_INDEX
            Value: "14"
          - Key: SECRET_KEY
            Value: ${env(SECRET_KEY)}
          - Key: DOMAIN_NAME
            Value: ""
          - Key: DOMAIN_PROTOCOL
            Value: "https"
          - Key: MAIL_ENABLED
            Value: "False"
          - Key: FS_BACKEND
            Value: "s3"
          - Key: FS_S3_REGION
            Value: "oss-cn-beijing"
          - Key: FS_S3_ENDPOINT
            Value: "https://oss-cn-beijing.aliyuncs.com"
          - Key: FS_S3_ACCESS_KEY
            Value: ${env(FS_S3_ACCESS_KEY)}
          - Key: FS_S3_SECRET_KEY
            Value: ${env(FS_S3_SECRET_KEY)}
          - Key: FS_BUCKET_PREFIX
            Value: "dcc-kitsu-"
          - Key: PREVIEW_FOLDER
            Value: "/tmp/previews"
          - Key: TMP_DIR
            Value: "/tmp/zou"
          - Key: ENABLE_JOB_QUEUE
            Value: "False"
          - Key: PROMETHEUS_METRICS_ENABLED
            Value: "False"
      replicaLimit:
        MaxInstance: 100
      triggers:
        - TriggerName: apig-trigger
          TriggerType: apig
          GatewayId: "gcp1jht7vgc9hjb8nftb0"
          ServiceName: "service-zou"
          UpstreamName: "upstream-zou"
          RouteName: default
          Path: "/"
          Method:
            - POST
            - GET
            - PUT
            - DELETE
            - HEAD
            - OPTIONS
            - CONNECT
