edition: 3.0.0
name: zou-backend-dev
access: "default-volcano"

vars:
  sid: "zou-dev"
  region: "cn-beijing"
  functionName: "zou-backend-dev-function"

resources:
  zou_backend_dev:
    component: volcano-vefaas
    props:
      common:
        Region: ${vars.region}
      function:
        Name: ${vars.functionName}
        Description: "Zou (Kitsu) backend API - dev"
        ExclusiveMode: true
        RequestTimeout: 600
        Runtime: native/v1
        SourceType: image
        Source: dcc-cloud2-cn-beijing.cr.volces.com/dcc-cloud/zou-backend:dev
        MemoryMB: 8192
        Processor: cpu
        Port: 8000
        Envs:
          - Key: PORT
            Value: "8000"
          - Key: DB_HOST
            Value: ${env(DB_HOST)}
          - Key: DB_PORT
            Value: ${env(DB_PORT)}
          - Key: DB_DATABASE
            Value: ${env(DB_DATABASE)}
          - Key: DB_USERNAME
            Value: ${env(DB_USERNAME)}
          - Key: DB_PASSWORD
            Value: ${env(DB_PASSWORD)}
          - Key: KV_HOST
            Value: ${env(KV_HOST)}
          - Key: KV_PORT
            Value: ${env(KV_PORT)}
          - Key: KV_USERNAME
            Value: ${env(KV_USERNAME)}
          - Key: KV_PASSWORD
            Value: ${env(KV_PASSWORD)}
          - Key: KV_AUTH_TOKEN_BLACKLIST_KV_INDEX
            Value: ${env(KV_AUTH_TOKEN_BLACKLIST_KV_INDEX)}
          - Key: KV_MEMOIZE_DB_INDEX
            Value: ${env(KV_MEMOIZE_DB_INDEX)}
          - Key: KV_EVENTS_DB_INDEX
            Value: ${env(KV_EVENTS_DB_INDEX)}
          - Key: KV_JOB_DB_INDEX
            Value: ${env(KV_JOB_DB_INDEX)}
          - Key: KV_CONFIG_DB_INDEX
            Value: ${env(KV_CONFIG_DB_INDEX)}
          - Key: SECRET_KEY
            Value: ${env(SECRET_KEY)}
          - Key: DOMAIN_NAME
            Value: ${env(DOMAIN_NAME)}
          - Key: DOMAIN_PROTOCOL
            Value: ${env(DOMAIN_PROTOCOL)}
          - Key: MAIL_ENABLED
            Value: ${env(MAIL_ENABLED)}
          - Key: FS_BACKEND
            Value: ${env(FS_BACKEND)}
          - Key: FS_S3_REGION
            Value: ${env(FS_S3_REGION)}
          - Key: FS_S3_ENDPOINT
            Value: ${env(FS_S3_ENDPOINT)}
          - Key: FS_S3_ACCESS_KEY
            Value: ${env(FS_S3_ACCESS_KEY)}
          - Key: FS_S3_SECRET_KEY
            Value: ${env(FS_S3_SECRET_KEY)}
          - Key: FS_BUCKET_PREFIX
            Value: ${env(FS_BUCKET_PREFIX)}
          - Key: PREVIEW_FOLDER
            Value: "/tmp/previews"
          - Key: TMP_DIR
            Value: "/tmp/zou"
          - Key: ENABLE_JOB_QUEUE
            Value: "False"
          - Key: PROMETHEUS_METRICS_ENABLED
            Value: "False"
      replicaLimit:
        MaxInstance: 10
      triggers:
        - TriggerName: apig-trigger-dev
          TriggerType: apig
          GatewayId: ${env(DEV_APIG_GATEWAY_ID)}
          ServiceName: "service-zou-dev"
          UpstreamName: "upstream-zou-dev"
          RouteName: dev
          Path: "/"
          Method:
            - POST
            - GET
            - PUT
            - DELETE
            - HEAD
            - OPTIONS
            - CONNECT
